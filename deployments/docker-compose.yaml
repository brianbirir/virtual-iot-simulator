name: iot-simulator

services:
  # ── Device Runtime (Go) ──────────────────────────────────────────────────
  runtime:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.runtime
    ports:
      - "50051:50051"   # gRPC
      - "8080:8080"     # Admin HTTP: /healthz /readyz /metrics
    environment:
      LOG_LEVEL: info
      GOGC: "100"
      GOMEMLIMIT: 512MiB
    command:
      - --port=50051
      - --admin-port=8080
      - --log-level=info
      - --mqtt-url=tcp://mosquitto:1883
      - --mqtt-pool-size=10
    depends_on:
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Orchestrator (Python/FastAPI) ─────────────────────────────────────────
  orchestrator:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.orchestrator
    command:
      - serve
      - --host=0.0.0.0
      - --port=8000
    ports:
      - "8000:8000"
    environment:
      IOT_SIM_RUNTIME: runtime:50051
    depends_on:
      runtime:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Frontend (React/nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.frontend
    ports:
      - "3001:80"
    depends_on:
      orchestrator:
        condition: service_healthy
    restart: unless-stopped

  # ── MQTT Broker ───────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-t", "healthcheck", "-m", "ping", "-q", "0"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    depends_on:
      runtime:
        condition: service_healthy
    restart: unless-stopped

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
      GF_DATASOURCES_DEFAULT_NAME: Prometheus
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
